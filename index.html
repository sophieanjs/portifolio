<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sophia Carvalho</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="/img/IMG_2220 (1) (1).png">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Sophia Carvalho</a>
            
            <div class="nav-links" id="navLinks">
                <a href="index.html" class="nav-link active">Início</a>
                <a href="galeria.html" class="nav-link">Galeria</a>
                <a href="sobre.html" class="nav-link">Sobre</a>
                <a href="contato.html" class="nav-link">Contato</a>
            </div>

            <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
                <span class="hamburger"></span>
            </button>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-bg"></div>
        <div class="hero-content">
            <h1 class="hero-title">Capturando Momentos</h1>
            <p class="hero-subtitle">Fotografia que conta histórias e eterniza memórias</p>
            <a href="galeria.html" class="btn-primary">
                Ver Galeria
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </a>
        </div>
    </section>

    <!-- Featured Work -->
    <section class="featured">
        <div class="container">
            <h2 class="section-title">Trabalhos em Destaque</h2>
            
            <div class="featured-grid">
                <a href="galeria.html" class="featured-item">
                    <img src="/img/Retrato/IMG_1401.JPG" alt="Retratos">
                    <div class="featured-overlay">
                        <h3>Retratos</h3>
                    </div>
                </a>

                <a href="galeria.html" class="featured-item">
                    <img src="/img/Paisagens/IMG_0434.jpg" alt="Paisagens">
                    <div class="featured-overlay">
                        <h3>Paisagens</h3>
                    </div>
                </a>

                <a href="galeria.html" class="featured-item">
                    <img src="/img/Casamento/IMG_1163 (1).jpg" alt="Casamento">
                    <div class="featured-overlay">
                        <h3>Casamento</h3>
                    </div>
                </a>
            </div>
        </div>
    </section>

    <!-- Call to Action -->
    <section class="cta">
        <div class="container">
            <h2 class="cta-title">ESSE MOMENTO MERECE SER ETERNIZADO!</h2>
            <a href="contato.html" class="btn-primary">Entrar em Contato</a>
        </div>
    </section>


    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>All content Copyright © 2026 Sophia Carvalho</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
